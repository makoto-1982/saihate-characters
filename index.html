<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>最果てUFO偵察マップ</title>
<style>
  :root {
    --bg: #07090d;
    --ui: rgba(240, 231, 215, 0.88);
    --panel: rgba(10, 12, 18, 0.64);
    --border: rgba(220, 208, 186, 0.22);
    --accent: #d6b167;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    color: var(--ui);
    touch-action: none;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle at 50% 45%, #171b24 0%, #0d1016 35%, #06070a 100%);
  }
  .hud {
    position: fixed;
    left: env(safe-area-inset-left, 0);
    right: env(safe-area-inset-right, 0);
    top: env(safe-area-inset-top, 0);
    padding: calc(12px + env(safe-area-inset-top, 0)) 12px 0;
    pointer-events: none;
    z-index: 10;
  }
  .titleCard {
    display: inline-block;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,.25);
    backdrop-filter: blur(4px);
  }
  .titleCard strong {
    display:block;
    font-size: 14px;
    letter-spacing: .08em;
    margin-bottom: 4px;
  }
  .titleCard span {
    display:block;
    font-size: 12px;
    opacity:.85;
    line-height:1.5;
  }
  .controls {
    position: fixed;
    inset: auto 0 calc(44px + env(safe-area-inset-bottom, 0)) 0;
    display: flex;
    justify-content: space-between;
    align-items: end;
    padding: 0 14px;
    z-index: 20;
    pointer-events: none;
  }
  .padWrap, .hint {
    pointer-events: auto;
  }
  .padWrap {
    width: min(34vw, 160px);
    height: min(34vw, 160px);
    position: relative;
    margin-left: 26px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(10, 12, 18, .30);
    box-shadow: inset 0 0 30px rgba(255,255,255,.04), 0 10px 30px rgba(0,0,0,.28);
    backdrop-filter: blur(3px);
  }
  .padBase {
    position:absolute; inset: 16%; border-radius:50%;
    border:1px solid rgba(255,255,255,.08);
    background: rgba(255,255,255,.03);
  }
  .padKnob {
    position:absolute;
    width: 34%;
    height: 34%;
    left: 33%;
    top: 33%;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.3), rgba(255,255,255,.08) 42%, rgba(0,0,0,.15) 100%);
    border: 1px solid rgba(255,255,255,.14);
    box-shadow: 0 4px 18px rgba(0,0,0,.35);
    transform: translate(0,0);
  }
  .hint {
    max-width: min(48vw, 280px);
    margin-left: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.55;
    box-shadow: 0 10px 30px rgba(0,0,0,.25);
    backdrop-filter: blur(4px);
  }
  .hint b { color: #f0d790; }
  @media (min-width: 900px) {
    .padWrap { width: 170px; height: 170px; }
    .hint { max-width: 340px; }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hud">
  <div class="titleCard">
    <strong>最果て偵察艇 “PATCH-1”</strong>
    <span>薄汚れた夜の街をふらふら浮遊。UFOは中央固定、マップがスクロールします。</span>
  </div>
</div>
<div class="controls">
  <div class="padWrap" id="pad">
    <div class="padBase"></div>
    <div class="padKnob" id="knob"></div>
  </div>
  <div class="hint"><b>操作</b><br>スマホは左下パッド、PCは矢印キー / WASD。<br>ゆらゆらした飛行感を少し強めに入れています。</div>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const pad = document.getElementById('pad');
  const knob = document.getElementById('knob');
  const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  const ufoImg = new Image();
  ufoImg.src = './assets/ufo.png';

  const WORLD = { width: 3600, height: 3600 };
  const TILE = 180;
  const player = { x: WORLD.width * 0.5, y: WORLD.height * 0.5, vx: 0, vy: 0, angle: 0 };
  const keys = new Set();
  const stick = { x: 0, y: 0, active: false };
  const pads = [];
  const buildings = [];
  const props = [];
  const signage = [];
  const grime = [];
  const puddles = [];
  const cables = [];
  let stars = [];

  function resize() {
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    makeStars();
  }

  function rng(seed) {
    let t = seed >>> 0;
    return function() {
      t += 0x6D2B79F5;
      let r = Math.imul(t ^ (t >>> 15), 1 | t);
      r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
      return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
    };
  }

  function buildWorld() {
    const rand = rng(73482);
    for (let gy = 0; gy < WORLD.height; gy += TILE) {
      for (let gx = 0; gx < WORLD.width; gx += TILE) {
        const roadColumn = (Math.floor(gx / TILE) % 4 === 1);
        const roadRow = (Math.floor(gy / TILE) % 4 === 2);
        if (roadColumn || roadRow) {
          // রাস্তা-style pad / asphalt details (roads)
          for (let i = 0; i < 2 + Math.floor(rand()*4); i++) {
            puddles.push({
              x: gx + rand() * TILE,
              y: gy + rand() * TILE,
              w: 14 + rand() * 36,
              h: 8 + rand() * 20,
              hue: rand()
            });
          }
          for (let i = 0; i < 1 + Math.floor(rand()*3); i++) {
            grime.push({x: gx + rand()*TILE, y: gy + rand()*TILE, r: 8 + rand()*20, a: 0.05 + rand()*0.07});
          }
          if (rand() < 0.18) {
            props.push({ type: 'barrel', x: gx + 30 + rand() * 110, y: gy + 40 + rand() * 100, rot: rand() * Math.PI });
          }
          if (rand() < 0.1) {
            props.push({ type: 'crate', x: gx + 20 + rand() * 120, y: gy + 30 + rand() * 110, rot: rand() * 0.3 - 0.15 });
          }
        } else {
          const bw = 86 + rand() * 48;
          const bh = 54 + rand() * 70;
          const bx = gx + 20 + rand() * (TILE - bw - 28);
          const by = gy + 22 + rand() * (TILE - bh - 28);
          buildings.push({
            x: bx, y: by, w: bw, h: bh,
            color: rand() < 0.5 ? '#423b38' : '#36313a',
            roof: rand() < 0.5 ? '#5b5350' : '#47404a',
            light: rand() < 0.55,
            patched: 2 + Math.floor(rand()*5)
          });
          if (rand() < 0.55) {
            signage.push({
              x: bx + bw * (0.15 + rand() * 0.55),
              y: by + 10 + rand() * (bh - 28),
              w: 18 + rand()*24,
              h: 8 + rand()*12,
              color: rand() < 0.5 ? '#d04f3d' : '#d5b35f',
              textish: rand() < 0.5
            });
          }
          if (rand() < 0.35) props.push({ type: 'barrel', x: bx + bw + 8 + rand()*10, y: by + bh - 12, rot: rand()*0.2 });
          if (rand() < 0.45) props.push({ type: 'vent', x: bx + rand()*bw, y: by - 6, rot: 0 });
        }
      }
    }
    for (let i = 0; i < 90; i++) {
      const x1 = rand() * WORLD.width;
      const x2 = Math.min(WORLD.width, x1 + 120 + rand()*180);
      const y = rand() * WORLD.height;
      cables.push({ x1, x2, y, sag: 8 + rand()*18 });
    }
  }

  function makeStars() {
    const rand = rng(9237);
    stars = [];
    for (let i = 0; i < 90; i++) {
      stars.push({ x: rand() * window.innerWidth, y: rand() * window.innerHeight * 0.55, r: rand() * 1.6 + 0.2, a: rand() * 0.7 + 0.2 });
    }
  }

  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
  function lerp(a,b,t){ return a + (b-a)*t; }

  function screenToWorldRect(camX, camY) {
    return {
      left: camX - 240,
      top: camY - 240,
      right: camX + window.innerWidth + 240,
      bottom: camY + window.innerHeight + 240
    };
  }

  function drawSky(time) {
    const grad = ctx.createLinearGradient(0, 0, 0, window.innerHeight);
    grad.addColorStop(0, '#080b13');
    grad.addColorStop(.5, '#0d1018');
    grad.addColorStop(1, '#07080d');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    ctx.save();
    ctx.globalAlpha = 0.75;
    for (const s of stars) {
      const tw = 0.75 + Math.sin(time * 0.001 + s.x) * 0.25;
      ctx.fillStyle = `rgba(240,235,220,${s.a * tw})`;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }

  function drawWorld(camX, camY, time) {
    const view = screenToWorldRect(camX, camY);

    // ground base
    ctx.fillStyle = '#13141a';
    ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

    // distant fog vignette
    const fog = ctx.createRadialGradient(window.innerWidth/2, window.innerHeight/2, 80, window.innerWidth/2, window.innerHeight/2, Math.max(window.innerWidth, window.innerHeight)*0.7);
    fog.addColorStop(0, 'rgba(0,0,0,0)');
    fog.addColorStop(1, 'rgba(0,0,0,0.26)');

    // roads / ground tiles
    const startX = Math.floor(view.left / TILE) * TILE;
    const startY = Math.floor(view.top / TILE) * TILE;
    for (let gy = startY; gy < view.bottom; gy += TILE) {
      for (let gx = startX; gx < view.right; gx += TILE) {
        const sx = gx - camX;
        const sy = gy - camY;
        const roadColumn = (Math.floor(gx / TILE) % 4 === 1);
        const roadRow = (Math.floor(gy / TILE) % 4 === 2);
        if (roadColumn || roadRow) {
          ctx.fillStyle = '#1a1b21';
          ctx.fillRect(sx, sy, TILE, TILE);
          ctx.strokeStyle = 'rgba(255,255,255,0.025)';
          ctx.lineWidth = 1;
          ctx.strokeRect(sx + .5, sy + .5, TILE - 1, TILE - 1);
          ctx.fillStyle = 'rgba(255, 231, 183, 0.04)';
          ctx.fillRect(sx + 8, sy + TILE * 0.48, TILE - 16, 3);
        } else {
          ctx.fillStyle = '#111218';
          ctx.fillRect(sx, sy, TILE, TILE);
        }
      }
    }

    // cables overhead
    ctx.strokeStyle = 'rgba(18,18,20,0.9)';
    ctx.lineWidth = 2;
    for (const c of cables) {
      if (c.y < view.top - 50 || c.y > view.bottom + 50 || c.x2 < view.left || c.x1 > view.right) continue;
      ctx.beginPath();
      const sx1 = c.x1 - camX, sx2 = c.x2 - camX, sy = c.y - camY;
      ctx.moveTo(sx1, sy);
      ctx.quadraticCurveTo((sx1 + sx2)/2, sy + c.sag, sx2, sy);
      ctx.stroke();
    }

    // puddles & grime beneath buildings for layering simplicity
    for (const p of puddles) {
      if (p.x + p.w < view.left || p.x - p.w > view.right || p.y + p.h < view.top || p.y - p.h > view.bottom) continue;
      const x = p.x - camX, y = p.y - camY;
      const g = ctx.createRadialGradient(x, y, 1, x, y, p.w);
      g.addColorStop(0, p.hue > .5 ? 'rgba(77,109,138,0.18)' : 'rgba(160,131,89,0.15)');
      g.addColorStop(1, 'rgba(22,25,30,0.02)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(x, y, p.w, p.h, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    for (const g of grime) {
      if (g.x + g.r < view.left || g.x - g.r > view.right || g.y + g.r < view.top || g.y - g.r > view.bottom) continue;
      ctx.fillStyle = `rgba(0,0,0,${g.a})`;
      ctx.beginPath(); ctx.arc(g.x - camX, g.y - camY, g.r, 0, Math.PI * 2); ctx.fill();
    }

    // buildings
    for (const b of buildings) {
      if (b.x + b.w < view.left || b.x > view.right || b.y + b.h < view.top || b.y > view.bottom) continue;
      const x = b.x - camX, y = b.y - camY;
      ctx.fillStyle = 'rgba(0,0,0,0.26)';
      ctx.fillRect(x + 8, y + b.h + 4, b.w, 10);
      ctx.fillStyle = b.color;
      ctx.fillRect(x, y, b.w, b.h);
      ctx.fillStyle = b.roof;
      ctx.fillRect(x - 6, y - 8, b.w + 12, 12);
      ctx.strokeStyle = 'rgba(0,0,0,0.45)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x + .5, y + .5, b.w - 1, b.h - 1);
      // windows
      const cols = Math.max(2, Math.floor(b.w / 28));
      const rows = Math.max(1, Math.floor(b.h / 24));
      for (let ry = 0; ry < rows; ry++) {
        for (let cx = 0; cx < cols; cx++) {
          const wx = x + 10 + cx * ((b.w - 20) / cols);
          const wy = y + 10 + ry * ((b.h - 18) / rows);
          ctx.fillStyle = b.light && (cx + ry) % 2 === 0 ? 'rgba(214,177,103,0.7)' : 'rgba(19,20,24,0.85)';
          ctx.fillRect(wx, wy, 10, 12);
        }
      }
      // patchwork repair plates
      for (let i = 0; i < b.patched; i++) {
        const pw = 10 + (i*7 % 18), ph = 8 + (i*5 % 12);
        const px = x + 6 + ((i*19) % Math.max(8, b.w - 18));
        const py = y + 8 + ((i*23) % Math.max(8, b.h - 18));
        ctx.fillStyle = i % 2 ? 'rgba(128,106,86,0.9)' : 'rgba(96,107,108,0.85)';
        ctx.fillRect(px, py, pw, ph);
        ctx.strokeStyle = 'rgba(0,0,0,0.35)';
        ctx.strokeRect(px + .5, py + .5, pw - 1, ph - 1);
      }
    }

    // signage
    for (const s of signage) {
      if (s.x + s.w < view.left || s.x > view.right || s.y + s.h < view.top || s.y > view.bottom) continue;
      const x = s.x - camX, y = s.y - camY;
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(x + 2, y + 2, s.w, s.h);
      ctx.fillStyle = s.color;
      ctx.fillRect(x, y, s.w, s.h);
      ctx.strokeStyle = 'rgba(0,0,0,0.4)';
      ctx.strokeRect(x + .5, y + .5, s.w - 1, s.h - 1);
      if (s.textish) {
        ctx.fillStyle = 'rgba(255,248,225,0.45)';
        for (let i = 0; i < Math.floor(s.w/6)-1; i++) ctx.fillRect(x + 3 + i*6, y + 3, 3, 2);
      }
    }

    // props
    for (const p of props) {
      if (p.x + 24 < view.left || p.x - 24 > view.right || p.y + 24 < view.top || p.y - 24 > view.bottom) continue;
      const x = p.x - camX, y = p.y - camY;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(p.rot || 0);
      if (p.type === 'barrel') {
        ctx.fillStyle = '#6a4a3f';
        ctx.fillRect(-7, -11, 14, 22);
        ctx.strokeStyle = '#2f2522';
        ctx.strokeRect(-6.5, -10.5, 13, 21);
        ctx.fillStyle = '#34363e';
        ctx.fillRect(-7, -8, 14, 3);
        ctx.fillRect(-7, 5, 14, 3);
      } else if (p.type === 'crate') {
        ctx.fillStyle = '#57524b';
        ctx.fillRect(-10, -10, 20, 20);
        ctx.strokeStyle = '#2c2624';
        ctx.strokeRect(-9.5, -9.5, 19, 19);
        ctx.beginPath(); ctx.moveTo(-10,-10); ctx.lineTo(10,10); ctx.moveTo(10,-10); ctx.lineTo(-10,10); ctx.stroke();
      } else if (p.type === 'vent') {
        ctx.fillStyle = '#4c5057';
        ctx.fillRect(-10, -5, 20, 10);
        ctx.strokeStyle = '#25272d';
        for (let i = -8; i <= 8; i += 4) { ctx.beginPath(); ctx.moveTo(i,-4); ctx.lineTo(i,4); ctx.stroke(); }
      }
      ctx.restore();
    }

    // vignette/fog
    ctx.fillStyle = fog;
    ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

    // scanline texture
    ctx.save();
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = '#fff';
    for (let y = 0; y < window.innerHeight; y += 3) ctx.fillRect(0, y, window.innerWidth, 1);
    ctx.restore();
  }

  function drawUFO(time, moving) {
    const cx = window.innerWidth * 0.5;
    const cy = window.innerHeight * 0.5;
    const bob = Math.sin(time * 0.0035) * 7 + Math.sin(time * 0.009) * 2.5;
    const sway = Math.sin(time * 0.0021) * 3;
    const thrust = moving ? 1 : 0.35;
    const tilt = lerp(player.angle, 0, 0.25) * 0.12;
    const hoverGlow = 0.16 + 0.08 * Math.sin(time * 0.008);

    // shadow / light on map
    const shadowY = cy + 58;
    const shadow = ctx.createRadialGradient(cx, shadowY, 14, cx, shadowY, 80);
    shadow.addColorStop(0, `rgba(0,0,0,${0.28 + thrust*0.08})`);
    shadow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = shadow;
    ctx.beginPath();
    ctx.ellipse(cx, shadowY, 92, 26, 0, 0, Math.PI*2);
    ctx.fill();

    const beam = ctx.createRadialGradient(cx, cy + 45, 10, cx, cy + 50, 100);
    beam.addColorStop(0, `rgba(227, 188, 109, ${hoverGlow})`);
    beam.addColorStop(1, 'rgba(227, 188, 109, 0)');
    ctx.fillStyle = beam;
    ctx.beginPath();
    ctx.ellipse(cx, cy + 55, 72, 30, 0, 0, Math.PI*2);
    ctx.fill();

    if (ufoImg.complete) {
      const baseW = Math.min(window.innerWidth * 0.28, 240);
      const scale = baseW / ufoImg.width;
      const w = ufoImg.width * scale;
      const h = ufoImg.height * scale;
      ctx.save();
      ctx.translate(cx + sway, cy + bob);
      ctx.rotate(tilt);
      ctx.drawImage(ufoImg, -w/2, -h/2 - 20, w, h);
      ctx.restore();
    } else {
      ctx.save();
      ctx.translate(cx + sway, cy + bob);
      ctx.fillStyle = '#7f817f';
      ctx.beginPath(); ctx.ellipse(0, 0, 120, 38, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#44484f';
      ctx.beginPath(); ctx.ellipse(0, -18, 52, 30, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  function update(dt) {
    let ix = 0, iy = 0;
    if (keys.has('ArrowLeft') || keys.has('KeyA')) ix -= 1;
    if (keys.has('ArrowRight') || keys.has('KeyD')) ix += 1;
    if (keys.has('ArrowUp') || keys.has('KeyW')) iy -= 1;
    if (keys.has('ArrowDown') || keys.has('KeyS')) iy += 1;
    if (stick.active) { ix += stick.x; iy += stick.y; }
    const len = Math.hypot(ix, iy) || 1;
    ix /= len; iy /= len;
    const speed = 220;
    player.vx = ix * speed;
    player.vy = iy * speed;
    player.x = clamp(player.x + player.vx * dt, 0, WORLD.width);
    player.y = clamp(player.y + player.vy * dt, 0, WORLD.height);
    const targetAngle = ix !== 0 || iy !== 0 ? Math.atan2(iy, ix) : 0;
    player.angle = lerp(player.angle, targetAngle, ix !== 0 || iy !== 0 ? 0.12 : 0.06);
  }

  function draw(time) {
    const camX = player.x - window.innerWidth / 2;
    const camY = player.y - window.innerHeight / 2;
    drawSky(time);
    drawWorld(camX, camY, time);
    drawUFO(time, Math.hypot(player.vx, player.vy) > 2);
  }

  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.032, (now - last) / 1000);
    last = now;
    update(dt);
    draw(now);
    requestAnimationFrame(loop);
  }

  const controlKeys = new Set([
    'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown',
    'KeyW', 'KeyA', 'KeyS', 'KeyD'
  ]);

  function normalizeControlKey(e) {
    if (e.code && controlKeys.has(e.code)) return e.code;
    const key = String(e.key || '').toLowerCase();
    const fallback = {
      arrowleft: 'ArrowLeft',
      arrowright: 'ArrowRight',
      arrowup: 'ArrowUp',
      arrowdown: 'ArrowDown',
      w: 'KeyW',
      a: 'KeyA',
      s: 'KeyS',
      d: 'KeyD'
    };
    return fallback[key] || '';
  }

  window.addEventListener('keydown', e => {
    const key = normalizeControlKey(e);
    if (!key) return;
    e.preventDefault();
    keys.add(key);
  }, { passive: false });

  window.addEventListener('keyup', e => {
    const key = normalizeControlKey(e);
    if (!key) return;
    e.preventDefault();
    keys.delete(key);
  }, { passive: false });

  window.addEventListener('blur', () => keys.clear());
  window.addEventListener('resize', resize);

  function updateKnob(clientX, clientY) {
    const rect = pad.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = clientX - cx;
    const dy = clientY - cy;
    const max = rect.width * 0.26;
    const dist = Math.hypot(dx, dy);
    const clamped = dist > max ? max / dist : 1;
    const kx = dx * clamped;
    const ky = dy * clamped;
    knob.style.transform = `translate(${kx}px, ${ky}px)`;
    stick.x = clamp(kx / max, -1, 1);
    stick.y = clamp(ky / max, -1, 1);
  }
  function resetKnob() {
    stick.x = 0; stick.y = 0; stick.active = false;
    knob.style.transform = 'translate(0,0)';
  }

  pad.addEventListener('pointerdown', e => {
    stick.active = true;
    pad.setPointerCapture(e.pointerId);
    updateKnob(e.clientX, e.clientY);
  });
  pad.addEventListener('pointermove', e => { if (stick.active) updateKnob(e.clientX, e.clientY); });
  pad.addEventListener('pointerup', resetKnob);
  pad.addEventListener('pointercancel', resetKnob);

  buildWorld();
  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
